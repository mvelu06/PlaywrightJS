<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright Test Runner UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 40px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .test-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .test-item {
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .test-item:hover {
      border-color: #667eea;
      background-color: #f8f9ff;
      transform: translateY(-2px);
    }

    .test-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .test-item label {
      cursor: pointer;
      flex: 1;
      font-size: 14px;
      color: #333;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-run {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-width: 150px;
      justify-content: center;
    }

    .btn-run:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-run:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e0e0e0;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
    }

    .option-group label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .option-group select,
    .option-group input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .option-group select:focus,
    .option-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .checkbox-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-item label {
      cursor: pointer;
      font-size: 14px;
      color: #333;
    }

    .output {
      background: #1e1e1e;
      color: #00ff00;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #333;
    }

    .output-empty {
      color: #666;
      font-style: italic;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .status.pending {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .status.running {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #333;
    }

    @media (max-width: 768px) {
      .content {
        padding: 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .test-list {
        grid-template-columns: 1fr;
      }

      .controls {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎭 Playwright Test Runner</h1>
      <p>Simple UI for running Playwright tests</p>
    </div>

    <div class="content">
      <!-- Status Section -->
      <div class="section">
        <div id="status" style="display: none;"></div>
      </div>

      <!-- Test Selection Section -->
      <div class="section">
        <div class="section-title">Select Tests</div>
        <div class="test-list" id="testList">
          <div class="test-item">
            <input type="checkbox" id="test-login" value="login.spec.js" checked>
            <label for="test-login">Login Tests</label>
          </div>
          <div class="test-item">
            <input type="checkbox" id="test-advanced" value="login.advanced.spec.js">
            <label for="test-advanced">Advanced Login Tests</label>
          </div>
          <div class="test-item">
            <input type="checkbox" id="test-all" value="all">
            <label for="test-all">All Tests</label>
          </div>
        </div>
      </div>

      <!-- Options Section -->
      <div class="section">
        <div class="section-title">Test Options</div>
        <div class="options">
          <div class="option-group">
            <label for="browser">Browser</label>
            <select id="browser">
              <option value="">All Browsers</option>
              <option value="chromium">Chromium</option>
              <option value="firefox">Firefox</option>
              <option value="webkit">WebKit</option>
            </select>
          </div>
          <div class="option-group">
            <label for="workers">Workers</label>
            <select id="workers">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
              <option value="8">8</option>
            </select>
          </div>
        </div>

        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="headed" name="headed">
            <label for="headed">Headed Mode (Show Browser)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="debug" name="debug">
            <label for="debug">Debug Mode</label>
          </div>
        </div>
      </div>

      <!-- Controls Section -->
      <div class="controls">
        <button class="button btn-run" id="runBtn" onclick="runTests()">
          <span>▶</span> Run Tests
        </button>
        <button class="button btn-secondary" id="clearBtn" onclick="clearOutput()">
          <span>✕</span> Clear
        </button>
        <button class="button btn-secondary" id="reportBtn" onclick="openReport()">
          <span>📊</span> View Report
        </button>
      </div>

      <!-- Output Section -->
      <div class="section">
        <div class="section-title">Output</div>
        <div class="output" id="output">
          <div class="output-empty">Output will appear here...</div>
        </div>
      </div>

      <!-- Stats Section -->
      <div class="stats" id="stats" style="display: none;">
        <div class="stat-card">
          <div class="stat-label">Total Tests</div>
          <div class="stat-value" id="totalTests">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Passed</div>
          <div class="stat-value" style="color: #28a745;" id="passedTests">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Failed</div>
          <div class="stat-value" style="color: #dc3545;" id="failedTests">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Duration</div>
          <div class="stat-value" id="duration">0s</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const runBtn = document.getElementById('runBtn');
    const statusDiv = document.getElementById('status');

    function setStatus(message, type = 'pending') {
      statusDiv.innerHTML = `
        <div class="status ${type}">
          ${type === 'running' ? '<span class="spinner"></span>' : ''}
          ${message}
        </div>
      `;
      statusDiv.style.display = 'block';
    }

    function addOutput(message) {
      if (output.querySelector('.output-empty')) {
        output.innerHTML = '';
      }
      const line = document.createElement('div');
      line.textContent = message;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function clearOutput() {
      output.innerHTML = '<div class="output-empty">Output will appear here...</div>';
      statusDiv.style.display = 'none';
      document.getElementById('stats').style.display = 'none';
    }

    function runTests() {
      // Disable run button during execution
      runBtn.disabled = true;

      // Get selected tests
      const testCheckboxes = document.querySelectorAll('#testList input[type="checkbox"]:checked');
      const selectedTests = Array.from(testCheckboxes).map(cb => cb.value).filter(v => v !== 'all');

      // Get options
      const browser = document.getElementById('browser').value;
      const workers = document.getElementById('workers').value;
      const headed = document.getElementById('headed').checked;
      const debug = document.getElementById('debug').checked;

      // Clear previous output
      output.innerHTML = '';
      setStatus('Preparing tests...', 'running');

      // Simulate test execution
      const startTime = Date.now();
      addOutput('======================================');
      addOutput('Playwright Test Runner');
      addOutput('======================================');
      addOutput('');
      addOutput(`✓ Selected Tests: ${selectedTests.length > 0 ? selectedTests.join(', ') : 'All tests'}`);
      addOutput(`✓ Browser: ${browser || 'All Browsers'}`);
      addOutput(`✓ Workers: ${workers}`);
      addOutput(`✓ Headed Mode: ${headed ? 'Yes' : 'No'}`);
      addOutput(`✓ Debug Mode: ${debug ? 'Yes' : 'No'}`);
      addOutput('');
      addOutput('Running tests...');
      addOutput('');

      // Simulate test execution with delays
      setTimeout(() => {
        addOutput('✓ Login Tests');
        addOutput('  ✓ Verify user can login with valid credentials (850ms)');
        addOutput('  ✓ Verify login fails with invalid credentials (720ms)');
        addOutput('  ✓ Verify login fails with missing username (650ms)');
        addOutput('  ✓ Verify login fails with missing password (680ms)');
        addOutput('');

        setTimeout(() => {
          addOutput('✓ Advanced Login Tests');
          addOutput('  ✓ Verify remember me functionality (1250ms)');
          addOutput('  ✓ Verify forgot password link is visible (580ms)');
          addOutput('  ✓ Verify form elements are present on login page (420ms)');
          addOutput('  ✓ Verify page title contains login (350ms)');
          addOutput('');

          const duration = ((Date.now() - startTime) / 1000).toFixed(2);
          addOutput('======================================');
          addOutput('✓ All tests passed! 8/8');
          addOutput(`Duration: ${duration}s`);
          addOutput('======================================');

          setStatus('✓ Tests completed successfully!', 'success');
          
          // Show stats
          document.getElementById('stats').style.display = 'grid';
          document.getElementById('totalTests').textContent = '8';
          document.getElementById('passedTests').textContent = '8';
          document.getElementById('failedTests').textContent = '0';
          document.getElementById('duration').textContent = `${duration}s`;

          // Re-enable run button
          runBtn.disabled = false;
        }, 1500);
      }, 1000);
    }

    function openReport() {
      alert('Report would open: playwright-report/index.html\n\nTo view the actual report, run: npm run report');
    }

    // Keyboard shortcut: Ctrl+Enter to run tests
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter' && !runBtn.disabled) {
        runTests();
      }
    });
  </script>
</body>
</html>
